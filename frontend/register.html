<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | KU Course Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light">
    <div class="auth-wrapper">
        <div class="card auth-card shadow-lg">
            <div class="text-center auth-header">
                <a href="/" class="logo text-dark">
                    <span class="ku-accent">KU</span> Portal
                </a>
                <h2>Create Your Profile</h2>
                <p>Register to manage your coursework</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="Aditya Patel" required>
                    <small class="error-text" id="nameError"></small>
                </div>
                <div class="form-group">
                    <label for="regEmail">University Email</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="aditya@student.karnavati.edu" required>
                    <small class="error-text" id="regEmailError"></small>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Create a strong password" required>
                    <small class="error-text" id="regPasswordError"></small>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat your password" required>
                    <small class="error-text" id="confirmPasswordError"></small>
                </div>
                <div id="registerAlert" class="alert alert-danger hidden"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg shadow-hover mt-3" id="registerBtn">Create Account</button>
            </form>
            <p class="text-center mt-4">Already registered? <a href="/login.html" class="ku-accent font-weight-bold">Login here</a></p>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
