<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | KU Course Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar dashboard-nav shadow-sm">
        <div class="container flex-space-between align-center">
            <a href="/dashboard.html" class="logo text-dark">
                <span class="ku-accent">KU</span> Portal
            </a>
            <div class="user-profile">
                <span id="userName" class="font-weight-bold">Loading...</span>
                <button class="btn btn-outline btn-sm ml-3" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container mt-4">
        <header class="dashboard-header mb-4">
            <h1 class="font-weight-500">Welcome to your dashboard, <span id="welcomeName" class="ku-accent">Student</span>!</h1>
            <p class="text-muted">Manage your courses, check available seats, and handle your schedule.</p>
        </header>

        <section class="enrolled-courses mb-5">
            <h2 class="section-title">Enrolled Courses</h2>
            <div id="enrolledCoursesList" class="courses-grid m-top-3">
                <div class="loader"></div>
            </div>
        </section>

        <section class="available-courses mb-5">
            <h2 class="section-title">Available Courses</h2>
            <div id="availableCoursesList" class="courses-grid m-top-3">
                <div class="loader"></div>
            </div>
        </section>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden shadow-lg">
        <p id="toastMessage"></p>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
